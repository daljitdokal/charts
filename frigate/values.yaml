---
image:
  repository: ghcr.io/blakeblackshear/frigate
  tag:
  pullPolicy: IfNotPresent

imagePullSecrets: []

env: {}

envFromSecrets: []

gpu:
  nvidia:
    enabled: false
    runtimeClassName:

shmSize: 2Gi

tmpfs:
  enabled: true
  sizeLimit: 1Gi

config: |
  tls:
    enabled: False
  mqtt:
    enabled: false

  detectors:
    ov_0:
      type: openvino
      device: CPU
    ov_1:
      type: openvino
      device: CPU
  detect:
    enabled: true
  semantic_search:
    enabled: true
    model_size: small
  face_recognition:
    enabled: true
    model_size: small
  lpr:
    enabled: true
  classification:
    bird:
      enabled: false
  notifications:
    enabled: false
    email: frigate@jamma.life
  model:
    width: 300
    height: 300
    input_tensor: nhwc
    input_pixel_format: bgr
    path: /openvino-model/ssdlite_mobilenet_v2.xml
    labelmap_path: /openvino-model/coco_91cl_bkgr.txt
  record:
    enabled: true
    retain:
      days: 2
      mode: all
    alerts:
      retain:
        days: 7
    detections:
      retain:
        days: 5
  objects:
    track:
      - person
      - car
      - bicycle
      - motorcycle
      - dog
      - cat
      - bird
      - chicken
      - licence_plate
  review:
    alerts:
      labels:
        - car
        - person
        - motorcycle
        - licence_plate
    detections:
      labels:
        - cat
        - dog
        - bicycle
        - speech
        - bird
        - chicken
  # Optional: Camera groups (default: no groups are setup)
  # NOTE: It is recommended to use the UI to setup camera groups
  camera_groups:
    # Required: Name of camera group
    jamma-farm:
      # Required: list of cameras in the group
      cameras:
        - jamma-driveway-cam
        - jamma-chicken-cam
      icon: LuCat
      # Required: index of this group
      order: 0
    # Required: Name of camera group
    jamma-vehicle-watch:
      order: 1
      icon: LuCar
      cameras:
        - jamma-airbnb-road-cam
        - jamma-airbnb-driveway-cam
        - jamma-driveway-cam
  cameras:
    jamma-driveway-cam:
      enabled: true
      webui_url: http://192.168.100.168
      ffmpeg:
        output_args:
          record: preset-record-generic-audio-aac
        inputs:
          - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.100.168:554/live
            roles:
              - detect
              - record
      detect:
        enabled: true
      motion:
        threshold: 40
        contour_area: 20
        improve_contrast: true

        mask:
          0.551,0.301,0.493,0.288,0.333,0.295,0.332,0.357,0.461,0.423,0.557,0.428,0.614,0.444,0.666,0.448,0.72,0.441,0.717,0.363,0.711,0.312,0.692,0.242,0.668,0.232,0.61,0.212,0.573,0.239
      notifications:
        enabled: true
      zones:
        Driveway:
          coordinates:
            0.049,0.268,0.076,0.285,0.035,0.342,0.069,0.352,0.003,0.401,0.002,0.918,0.03,0.991,0.996,0.995,0.993,0.695,0.743,0.659,0.75,0.565,0.999,0.572,0.997,0.476,0.932,0.437,0.638,0.436,0.456,0.423,0.335,0.361,0.27,0.322,0.155,0.319,0.08,0.336,0.091,0.268,0.072,0.256
          loitering_time: 0
        Lawn:
          coordinates:
            0.149,0.317,0.198,0.279,0.187,0.253,0.277,0.218,0.465,0.203,0.691,0.217,0.788,0.253,0.789,0.275,0.58,0.258,0.548,0.297,0.493,0.286,0.285,0.294,0.263,0.314
          loitering_time: 0
        Deck:
          coordinates:
            0.813,0.26,0.657,0.263,0.695,0.321,0.823,0.345,0.919,0.427,0.983,0.463,0.995,0.375
          loitering_time: 0
      review:
        alerts:
          required_zones:
            - Driveway
            - Lawn
            - Deck
    jamma-airbnb-road-cam:
      enabled: true
      webui_url: http://192.168.8.200
      ffmpeg:
        output_args:
          record: preset-record-generic-audio-aac
        inputs:
          - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.8.200:554/live
            roles:
              - detect
              - record
      detect:
        enabled: true
      motion:
        threshold: 40
        contour_area: 20
        improve_contrast: true

        mask:
          - 0.068,0.721,0.243,0.647,0.227,0.558,0.177,0.468,0.114,0.466,0.086,0.517,0.062,0.568,0.047,0.65
          - 0.394,0.837,0.373,0.58,0.429,0.533,0.489,0.538,0.528,0.477,0.577,0.481,0.628,0.526,0.642,0.588,0.644,0.689,0.613,0.762
      zones:
        Front_lawn:
          coordinates:
            0.617,0.469,0.482,0.387,0.298,0.509,0,0.717,0,0.743,0.197,0.58,0.245,0.744
          loitering_time: 10
          objects:
            - car
            - motorcycle
            - person
          inertia: 3
        Grass_parking:
          coordinates:
            0.54,0.329,0.735,0.394,0.819,0.304,0.925,0.257,0.934,0.186,0.718,0.229
          loitering_time: 0
          inertia: 3
          objects:
            - person
            - motorcycle
            - car
        Gravel:
          coordinates:
            0.775,0.103,0.723,0.095,0.687,0.112,0.674,0.134,0.67,0.177,0.721,0.15
          loitering_time: 0
          inertia: 3
          objects:
            - person
            - motorcycle
            - car
        road:
          coordinates: 0.01,0.64,0.535,0.232,0.664,0.13,0.594,0.287,0.001,0.708
          loitering_time: 0
          objects:
            - motorcycle
            - car
          friendly_name: Road
      notifications:
        enabled: true
      review:
        alerts:
          required_zones:
            - Front_lawn
            - Grass_parking
            - Gravel
    jamma-airbnb-driveway-cam:
      enabled: true
      webui_url: http://192.168.1.206
      ffmpeg:
        output_args:
          record: preset-record-generic-audio-aac
        inputs:
          - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.206:554/live
            roles:
              - detect
              - record
      detect:
        enabled: true
      motion:
        threshold: 40
        contour_area: 20
        improve_contrast: true

      notifications:
        enabled: true
      zones:
        Lawn:
          coordinates: 0.31,0.536,0.562,0.754,0.558,0.996,0.001,0.996,0.002,0.726
          loitering_time: 0
        Parking:
          coordinates:
            0.32,0.532,0.52,0.181,0.743,0.181,0.772,0.212,0.986,0.576,0.994,0.862,0.566,0.719
          loitering_time: 0
        Verge:
          coordinates: 0.804,0.225,0.918,0.244,0.999,0.341,0.995,0.531
          loitering_time: 0
      review:
        alerts:
          required_zones:
            - Lawn
            - Parking
            - Verge
    jamma-chicken-cam:
      enabled: true
      ffmpeg:
        output_args:
          record: preset-record-generic-audio-copy
        inputs:
          - path:
              rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.16.148:554/cam/realmonitor?channel=1&subtype=1
            roles:
              - detect
      detect:
        enabled: false
      motion:
        threshold: 60
        contour_area: 20
        improve_contrast: true

      notifications:
        enabled: false
  go2rtc:
    streams:
      jamma-driveway-cam:
        - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.100.168:554/live
      jamma-airbnb-road-cam:
        - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.8.200:554/live
      jamma-airbnb-driveway-cam:
        - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.206:554/live
      jamma-chicken-cam:
        - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.16.148:554/cam/realmonitor?channel=1&subtype=0



probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    failureThreshold: 5
    timeoutSeconds: 10
  readiness:
    enabled: true
    initialDelaySeconds: 30
    failureThreshold: 5
    timeoutSeconds: 10
  startup:
    enabled: false
    failureThreshold: 30
    periodSeconds: 10

service:
  type: ClusterIP
  port: 5000

persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 100Mi
    skipuninstall: true

    ## Copy configMap config into volume to make writable
    ## All live changes are lost when pod restarts, but this allows
    ## an easy way to run migrations and edit config, then scrape
    ## it from the API or copy out of the pod and update local helm values
    ephemeralWritableConfigYaml: true

  media:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1000Gi
    skipuninstall: true

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  #   gpu.intel.com/i915: 1
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  #   gpu.intel.com/i915: 1

# -- Set Frigate Container Security Context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # privileged: true

# -- Set Pod level Security Context
# -- the container level securiy context defined above
# -- will override it for frigate container
podSecurityContext: {}
